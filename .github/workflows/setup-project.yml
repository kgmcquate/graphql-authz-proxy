# Run this ONCE before enabling the ticket manager:
#   GitHub → Actions → Setup Ticket Manager Project → Run workflow
#
# It will create the project board (if it doesn't exist), configure the
# Status columns, and print the project_number to put in ticket-manager.yml.
#
# Required secret: GH_PAT (repo + project scopes)

name: Setup Ticket Manager Project

on:
  workflow_dispatch:
    inputs:
      project_title:
        description: 'Name for the project board (e.g. "graphql-authz-proxy Tasks")'
        required: true
        type: string

jobs:
  setup:
    uses: kgmcquate/ai-agents/.github/workflows/setup-project.yml@main
    with:
      project_title: ${{ inputs.project_title }}
